name: PR Pipeline                                            #No Dockerfile is present here, PR should only test code, not deploy

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize]

jobs:
  build-test:
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "18"
      run_tests: true

  pr-comment:
    runs-on: ubuntu-latest
    needs: build-test                                       #Runs only after tests pass, If tests fail → this job won’t run

    steps:
      - name: Print PR success message
        run: |
          echo "PR checks passed for branch: ${{ github.head_ref }}"
